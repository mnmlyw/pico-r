name: Deploy web player to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Run tests
        run: cargo test --locked

      - name: Build wasm (release)
        run: cargo build --locked --release --target wasm32-unknown-unknown

      - name: Install upstream binaryen
        # Ubuntu's apt wasm-opt is too old; rejects sign-ext / nontrapping-
        # fptoint that current rustc emits. Pull a pinned upstream release.
        run: |
          curl -sSL https://github.com/WebAssembly/binaryen/releases/download/version_119/binaryen-version_119-x86_64-linux.tar.gz \
            | sudo tar -xz -C /usr/local --strip-components=1

      - name: Stage web/
        run: |
          mkdir -p out
          cp web/index.html out/
          cp target/wasm32-unknown-unknown/release/pico_r.wasm out/pico-r.wasm
          wasm-opt -Oz \
            --enable-bulk-memory \
            --enable-nontrapping-float-to-int \
            --enable-sign-ext \
            --enable-mutable-globals \
            --enable-reference-types \
            --enable-multivalue \
            -o out/pico-r.wasm out/pico-r.wasm
          ls -lh out/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
