name: Deploy web player to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup target add wasm32-unknown-unknown

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --check

      - name: Check host build
        run: cargo check --locked --all-targets

      # `cargo test` runs in the default (dev) profile, since [profile.release]
      # uses panic=abort and the test harness needs unwind for catch_unwind.
      - name: Run tests
        run: cargo test --locked

      - name: Run Clippy
        run: cargo clippy --locked --all-targets -- -A warnings -D clippy::correctness -D clippy::suspicious

      - name: cargo-deny (advisories, bans, licenses)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans licenses

      - name: Install binaryen (wasm-opt)
        run: sudo apt-get update && sudo apt-get install -y binaryen

      - name: Build wasm (release)
        run: cargo build --locked --release --target wasm32-unknown-unknown

      - name: Stage web/
        run: |
          mkdir -p out
          cp web/index.html out/
          cp target/wasm32-unknown-unknown/release/pico_r.wasm out/pico-r.wasm
          wasm-opt -Oz -o out/pico-r.wasm out/pico-r.wasm
          ls -lh out/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  e2e:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: github-pages
          path: web-artifact
      - run: |
          # Pages artifact is a tar; extract into web/.
          mkdir -p web
          tar -xf web-artifact/artifact.tar -C web
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd tools/e2e && npm install --no-audit --no-fund
      - run: node tools/e2e/smoke.mjs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
